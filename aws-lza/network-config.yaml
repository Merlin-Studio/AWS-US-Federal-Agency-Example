# Inter-region peering (warm-standby DR path). LZA establishes the peering and
# wires the requester/accepter route-table associations.
transitGatewayPeering:
  - name: primary-to-secondary
    requester:
      transitGatewayName: main-tgw
      account: Network
      region: us-west-1
      routeTableAssociations: main-tgw-spokes
    accepter:
      transitGatewayName: main-tgw-west
      account: Network
      region: us-east-1
      routeTableAssociations: main-tgw-west-Associations
      autoAccept: true

# AWS Direct Connect (wizard section 05). LZA provisions the Direct Connect
# Gateway + virtual interface; the physical cross-connect must be ordered out of
# band from the colocation provider, so connectionId is a placeholder until the
# circuit is live (location EqDC2, 1Gbps, dedicated).
# DXGW Amazon-side ASN 64514 is distinct from the customer ASN 64512 (eBGP).
# ⚠️ Direct Connect VIF type is 'private', but this landing zone routes through a Transit Gateway and has no virtual private gateway for a private VIF to bind to. Use a 'transit' VIF (it associates the Direct Connect Gateway to the Transit Gateway for multi-VPC reach), or attach a VGW to the target VPC before deploying.
directConnectGateways:
  - name: "onprem-dxgw"
    account: Network
    asn: 64514
    gatewayName: "onprem-dxgw"
    virtualInterfaces:
      - name: primary-vif
        connectionId: PLACEHOLDER_DX_CONNECTION_ID
        customerAsn: 64512
        interfaceName: primary-vif
        ownerAccount: Network
        region: us-west-1
        type: private
        vlan: 100


# ⚠️ AWS Client VPN requested (wizard section 05, client_vpn.enabled=true) but
# Landing Zone Accelerator 1.14.x has NO native Client VPN endpoint block in
# network-config.yaml — this is a format limitation, not a dropped section.
# PROVISION IT OUT OF BAND: create an aws_ec2_client_vpn_endpoint (or the
# equivalent CloudFormation) and associate it to the workload VPC's private
# subnets, then add the authorization rules. Settings declared in the wizard:
#   client_cidr:  192.168.100.0/22
#   split_tunnel: true
#   auth_method:  federated

centralNetworkServices:
  # Centralized inspection (topology SoT). The AWS Network Firewall lives in the
  # inspection VPC; LZA authors stateful rules in firewall-rules/rules.txt (it
  # does not reference AWS-managed rule group ARNs the way the other formats do).
  delegatedAdminAccount: Network
  networkFirewall:
    firewalls:
      - name: inspection-nfw
        firewallPolicy: inspection-nfw-policy
        vpc: inspection
        subnets:
          - insp-private-a
          - insp-private-b
        loggingConfiguration:
          - destination: cloud-watch-logs
            type: ALERT
          - destination: cloud-watch-logs
            type: FLOW
    policies:
      - name: inspection-nfw-policy
        regions:
          - us-west-1
        firewallPolicy:
          statelessDefaultActions:
            - aws:forward_to_sfe
          statelessFragmentDefaultActions:
            - aws:forward_to_sfe
          statefulRuleGroups:
            - name: inspection-nfw-stateful
        shareTargets:
          organizationalUnits:
            - Workloads
    rules:
      - name: inspection-nfw-stateful
        regions:
          - us-west-1
        capacity: 1000
        type: STATEFUL
        ruleGroup:
          rulesSource:
            rulesFile: firewall-rules/rules.txt
        shareTargets:
          organizationalUnits:
            - Workloads

dhcpOptions:
  []

endpointPolicies:
  - name: Default
    document: vpc-endpoint-policies/default.json