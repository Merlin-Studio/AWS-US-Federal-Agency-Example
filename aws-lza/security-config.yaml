# Centralised security services: GuardDuty, Security Hub, Config, Macie,
# Access Analyzer, IAM password policies, AWS Config rules.
# Schema: https://awslabs.github.io/landing-zone-accelerator-on-aws/v1.14/typedocs/

centralSecurityServices:
  delegatedAdminAccount: Audit

  ebsDefaultVolumeEncryption:
    enable: true
    excludeRegions: []

  s3PublicAccessBlock:
    enable: true
    excludeAccounts: []

  scpRevertChangesConfig:
    enable: true

  snsSubscriptions:
    - level: High
      email: "my2mail@acme.gov"
    - level: Medium
      email: "my2mail@acme.gov"
    - level: Low
      email: "my2mail@acme.gov"

  macie:
    enable: true
    excludeRegions: []
    policyFindingsPublishingFrequency: FIFTEEN_MINUTES
    publishSensitiveDataFindings: true
    lifecycleRules:
      - enabled: true
        expiration: 365
        noncurrentVersionExpiration: 90
        abortIncompleteMultipartUpload: 7

  # ⚠️ Amazon Inspector is REQUIRED for this landing zone (inspector_enabled=true;
  # PCI-DSS 11.3.1 / NIST RA-5) but the Landing Zone Accelerator has no native
  # Inspector block under centralSecurityServices. ENABLE IT OUT-OF-BAND: register
  # the audit account as the Inspector delegated admin and turn on org auto-enable
  # for ECR/EC2/Lambda. The OpenTofu, CDK and tfvars formats render this natively.
  #   aws inspector2 enable-delegated-admin-account --delegated-admin-account-id <AUDIT>
  #   aws inspector2 update-organization-configuration --auto-enable ec2=true,ecr=true,lambda=true

  guardduty:
    enable: true
    excludeRegions: []
    s3Protection:
      enable: true
      excludeRegions: []
    eksProtection:
      enable: true
      excludeRegions: []
    # GuardDuty Malware Protection (LZA v1.14 ec2Protection):
    # forensic scanning of EBS volumes on workloads flagged in findings.
    # HIPAA §164.308(a)(6)(ii) for PHI workloads. keepSnapshots retains
    # snapshots of infected volumes as forensic evidence.
    ec2Protection:
      enable: true
      keepSnapshots: true
      excludeRegions: []
    # RDS Protection — on for regulated frameworks or when RDS/Aurora is in use
    # (bank transactional data concentrates there); gated by the GuardDuty SoT.
    rdsProtection:
      enable: true
      excludeRegions: []
    autoEnableOrgMembers: true
    exportConfiguration:
      enable: true
      destinationType: S3
      exportFrequency: FIFTEEN_MINUTES
    lifecycleRules:
      - enabled: true
        expiration: 365
        noncurrentVersionExpiration: 90
        abortIncompleteMultipartUpload: 7

  auditManager:
    enable: true
    excludeRegions: []
    defaultReportsConfiguration:
      enable: true
      destinationType: S3
    lifecycleRules:
      - enabled: true
        expiration: 2555
        noncurrentVersionExpiration: 90
        abortIncompleteMultipartUpload: 7

  detective:
    enable: true
    excludeRegions: []

  securityHub:
    enable: true
    regionAggregation: true
    excludeRegions: []
    standards:
      - name: aws-foundational-security-best-practices/v/1.0.0
        enable: true
        controlsToDisable: []
      - name: cis-aws-foundations-benchmark/v/1.4.0
        enable: true
        controlsToDisable: []
      - name: nist-800-53/v/5.0.0
        enable: true
        controlsToDisable: []

  ssmAutomation:
    excludeRegions: []
    documentSets:
      - shareTargets:
          organizationalUnits:
            - Root
        documents:
          - name: Attach-IAM-Instance-Profile
            template: ssm-documents/attach-iam-instance-profile.yaml
          - name: Attach-IAM-Role-Policy
            template: ssm-documents/attach-iam-role-policy.yaml

accessAnalyzers:
  enable: true

iamPasswordPolicy:
  allowUsersToChangePassword: true
  hardExpiry: false
  requireUppercaseCharacters: true
  requireLowercaseCharacters: true
  requireSymbols: true
  requireNumbers: true
  minimumPasswordLength: 14
  passwordReusePrevention: 24
  maxPasswordAge: 90

awsConfig:
  enableConfigurationRecorder: true
  enableDeliveryChannel: true
  overrideExisting: false
  aggregation:
    enable: true
    delegatedAdminAccount: Audit
  ruleSets:
    - deploymentTargets:
        organizationalUnits:
          - Root
      rules:
        # FedRAMP High required rules
        - name: encrypted-volumes
          identifier: ENCRYPTED_VOLUMES
        - name: rds-storage-encrypted
          identifier: RDS_STORAGE_ENCRYPTED
        - name: s3-bucket-server-side-encryption-enabled
          identifier: S3_BUCKET_SERVER_SIDE_ENCRYPTION_ENABLED
        - name: s3-bucket-default-lock-enabled
          identifier: S3_BUCKET_DEFAULT_LOCK_ENABLED
        - name: cloudtrail-enabled
          identifier: CLOUD_TRAIL_ENABLED
        - name: cloud-trail-encryption-enabled
          identifier: CLOUD_TRAIL_ENCRYPTION_ENABLED
        - name: cloud-trail-log-file-validation-enabled
          identifier: CLOUD_TRAIL_LOG_FILE_VALIDATION_ENABLED
        - name: guardduty-enabled-centralized
          identifier: GUARDDUTY_ENABLED_CENTRALIZED
        - name: securityhub-enabled
          identifier: SECURITYHUB_ENABLED
        - name: kms-cmk-not-scheduled-for-deletion
          identifier: KMS_CMK_NOT_SCHEDULED_FOR_DELETION
        - name: cmk-backing-key-rotation-enabled
          identifier: CMK_BACKING_KEY_ROTATION_ENABLED
        - name: iam-password-policy
          identifier: IAM_PASSWORD_POLICY
        - name: iam-user-mfa-enabled
          identifier: IAM_USER_MFA_ENABLED
        - name: ec2-imdsv2-check
          identifier: EC2_IMDSV2_CHECK
        - name: vpc-flow-logs-enabled
          identifier: VPC_FLOW_LOGS_ENABLED
        - name: lambda-function-public-access-prohibited
          identifier: LAMBDA_FUNCTION_PUBLIC_ACCESS_PROHIBITED

keyManagementService:
  # HSM-backed KMS (FIPS 140-2 Level 3) — declared via values.kms_use_hsm. LZA's
  # keySets schema does not natively bind keys to an AWS CloudHSM custom key
  # store, so the binding is a POST-DEPLOY step: create a CloudHSM cluster (2
  # HSMs for HA), create a custom key store, connect it, then re-create each key
  # below with --origin AWS_CLOUDHSM --custom-key-store-id <PLACEHOLDER_CLOUDHSM_KEY_STORE_ID>.
  # The placeholder appears in PLACEHOLDERS.md — see also DEPLOYMENT_GUIDE.md.
  keySets:
    - name: workload-default
      alias: alias/workload/default
      description: Default workload CMK
      enableKeyRotation: true
      enabled: true
      # HSM-backed (FIPS 140-2 L3): bind to CloudHSM custom key store
      # PLACEHOLDER_CLOUDHSM_KEY_STORE_ID post-deploy (LZA keySets does not
      # support customKeyStoreName natively — recreate with --origin AWS_CLOUDHSM).
      deploymentTargets:
        organizationalUnits:
          - Root
    - name: s3-objects
      alias: alias/workload/s3-objects
      description: S3 SSE-KMS CMK
      enableKeyRotation: true
      enabled: true
      # HSM-backed (FIPS 140-2 L3): bind to CloudHSM custom key store
      # PLACEHOLDER_CLOUDHSM_KEY_STORE_ID post-deploy (LZA keySets does not
      # support customKeyStoreName natively — recreate with --origin AWS_CLOUDHSM).
      deploymentTargets:
        organizationalUnits:
          - Root
    - name: rds
      alias: alias/workload/rds
      description: RDS encryption CMK
      enableKeyRotation: true
      enabled: true
      # HSM-backed (FIPS 140-2 L3): bind to CloudHSM custom key store
      # PLACEHOLDER_CLOUDHSM_KEY_STORE_ID post-deploy (LZA keySets does not
      # support customKeyStoreName natively — recreate with --origin AWS_CLOUDHSM).
      deploymentTargets:
        organizationalUnits:
          - Root
