# AWS Organizations structure, OU tree, and Service Control Policies.
# Schema: https://awslabs.github.io/landing-zone-accelerator-on-aws/v1.14/typedocs/

enable: true

# OU tree — source of truth: generators/aws_ou_tree.py. Covers the profile
# baseline, custom OUs, and every OU an account is assigned to (incl. nested
# paths) so accounts-config.yaml never references a missing OU. Suspended is
# always present so the Quarantine SCP has a non-empty deploymentTargets list.
organizationalUnits:
  - name: Security
  - name: Workloads
  - name: Suspended
  - name: Infrastructure
  - name: PolicyStaging
  - name: Workloads/Sandbox
  - name: Workloads/Dev
  - name: Workloads/Staging
  - name: Workloads/Prod
  - name: Workloads/Prod/Regulated
  - name: Workloads/Prod/DR

quarantineNewAccounts:
  enable: true
  scpPolicyName: Quarantine-Policy

# SCP set sourced from generators/aws_scp_policies.py — identical across
# OpenTofu / LZA / CDK / tfvars (Quarantine + Guardrails-Security/Sandbox +
# region restrictions under FedRAMP/GDPR). The matching policy JSON files are
# emitted by the LZA composer.
serviceControlPolicies:
  - name: Quarantine-Policy
    description: Deny all actions for newly created accounts until reviewed.
    policy: service-control-policies/quarantine.json
    type: customerManaged
    deploymentTargets:
      organizationalUnits:
        - Suspended
  - name: Guardrails-Security
    description: "Deny disabling CloudTrail/Config/GuardDuty/Security Hub. Attached to Workloads + Infrastructure — every member account that must never turn off a security service. The Security OU is intentionally excluded: it holds the delegated administrator (Audit), which legitimately calls GuardDuty/Security Hub member-management APIs this policy denies. (Targeting only Security — or Root — would either leave workloads unprotected or break the delegated admin.)"
    policy: service-control-policies/guardrails-security.json
    type: customerManaged
    strategy: deny-list
    deploymentTargets:
      organizationalUnits:
        - Workloads
        - Infrastructure
  - name: Guardrails-Sandbox
    description: Cost guardrails for sandbox accounts (deny large/accelerated instance types + long-term capacity purchases). Scoped to the Sandbox OU only so it never restricts production workloads.
    policy: service-control-policies/guardrails-sandbox.json
    type: customerManaged
    strategy: deny-list
    deploymentTargets:
      organizationalUnits:
        - Workloads/Sandbox
  - name: Region-Restriction-USOnly
    description: Restrict all account actions to US regions for FedRAMP.
    policy: service-control-policies/region-restriction-us.json
    type: customerManaged
    strategy: deny-list
    deploymentTargets:
      organizationalUnits:
        - Root
  - name: Protect-Security-Services
    description: Deny disabling CloudTrail / Config / GuardDuty / Security Hub at any account in the org. NIS2 Art 21 risk-management; FedRAMP/NIST SI-4 + CA-7 monitoring integrity; HIPAA admin safeguards; PCI-DSS Req 10 audit-log protection.
    policy: service-control-policies/protect-security-services.json
    type: customerManaged
    strategy: deny-list
    deploymentTargets:
      organizationalUnits:
        - Root
  - name: Require-IMDSv2
    description: "Deny launching EC2 instances without IMDSv2 (http_tokens=required) and deny weakening the metadata options afterwards. Prevention paired with the ec2-imdsv2-check Config rule's detection. CIS 5.4/5.6; NIST/FedRAMP AC-3 + SC-23; PCI-DSS Req 2; HIPAA technical safeguards."
    policy: service-control-policies/require-imdsv2.json
    type: customerManaged
    strategy: deny-list
    deploymentTargets:
      organizationalUnits:
        - Root
  - name: Deny-Root-Access
    description: "Deny all actions by the account root user (CIS 1.7 / Control Tower 'disallow root' guardrail). Break-glass is preserved: the condition only matches the root principal, so IAM roles/users are unaffected (use a break-glass admin role), and SCPs never apply to the organization management account's root."
    policy: scp/deny-root.json
    type: customerManaged
    strategy: deny-list
    deploymentTargets:
      organizationalUnits:
        - Root

